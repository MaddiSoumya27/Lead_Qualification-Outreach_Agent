services:
  # FastAPI Backend Service
  - type: web
    name: lqoa-api
    env: python
    region: oregon
    branch: main
    buildCommand: python -m pip install --upgrade pip setuptools wheel && python -m pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: API_HOST
        value: "0.0.0.0"
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "720"
      - key: ENRICHMENT_PROVIDER
        value: mock
      - key: STRUCTURED_LOGGING
        value: "true"
      - key: ENVIRONMENT
        value: production
      # Set these manually in the Render dashboard:
      # DATABASE_URL  - from the Render Postgres service (Internal URL)
      # JWT_SECRET_KEY - generate: python3 -c "import secrets; print(secrets.token_urlsafe(32))"
      # OPENAI_API_KEY - optional, leave blank for offline mode

  # Streamlit Frontend Service
  - type: web
    name: lqoa-streamlit
    env: python
    region: oregon
    branch: main
    buildCommand: python -m pip install --upgrade pip setuptools wheel && python -m pip install -r requirements.txt
    startCommand: streamlit run gate/enhanced_streamlit_app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --server.runOnSave false --browser.gatherUsageStats false
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: ENRICHMENT_PROVIDER
        value: mock
      - key: STRUCTURED_LOGGING
        value: "true"
      - key: ENVIRONMENT
        value: production
      # Set these manually in the Render dashboard:
      # DATABASE_URL   - same Internal URL as API service
      # JWT_SECRET_KEY - same value as API service
      # API_BASE_URL   - e.g. https://lqoa-api.onrender.com

databases:
  - name: lqoa-postgres
    databaseName: lqoa
    user: lqoa_user
    region: oregon
    plan: free
